<html>
  <head>
    <title>Assignment-03 || My Form</title>
  </head>
  <body>
    <h1>Registration Form</h1>

			<form id="form" action="" method="">
				<label>First Name</label>
				<input type="text" name="fname" placeholder="Enter Your First Name" required>

				<br>
				<br>

				<label>Last Name</label>
				<input type="text" name="lname" placeholder="Enter Your Last Name" required>

				<br>
				<br>

				<label>Full Name</label>
				<input type="text" name="fullname" placeholder="Enter Your Full Name" required>

				<br>
				<br>

				<label>Age</label>
				<input type="number" name="age" placeholder="Enter Your Age" required>

				<br>
				<br>

				<label>Date of Birth</label>
				<input type="date" name="dob" min="2000-01-01" max="2024-12-31" required>

				<br>
				<br>

				<label>Gender</label>
				<input type="radio" name="gender" value="Male" required>Male
				<input type="radio" name="gender" value="Female" required>Female
                <input type="radio" name="gender" value="other" required>Other

				<br>
				<br>

				<label>Religion</label>
				<input type="checkbox" name="religion" value="Hindu" required>Hindu
				<input type="checkbox" name="religion" value="Islam" required>Islam
				<input type="checkbox" name="religion" value="Christan" required>Christan
				<input type="checkbox" name="religion" value="Buddho" required>Buddho


				<br>
				<br>

				<label>Origin Country</label>
					<select>
						<option>USA</option>
						<option>Australia</option>
						<option selected>Bangladesh</option>
						<option>India</option>
						<option>France</option>
						<option>UK</option>
						<option>Italy</option>
						<option>Canada</option>
					</select>

					<br>
					<br>

				<label>Phone</label>
					<select>
						<option>+123</option>
						<option>+966</option>
						<option selected>+880</option>
						<option>+440</option>
						<option>+769</option>
						<option>+600</option>
					</select>
					<input type="tel" name="phone" min="11" max="16" placeholder="Enter Your Mobile Number" required>


				<br>
				<br>

				<label>Email</label>
				<input type="email" name="email" placeholder="Enter Your Email" required>


				<br>
				<br>

				<label>Upload your photo</label>
				<input type="file" name="photo" required>

				<br>
				<br>

				<label>Upload your CV</label>
				<input type="file" name="cv" required>

				<br>
				<br>

				<label>Your Favourite Color</label>
				<input type="color" name="color">

                <br>
				<br>


				<label>Search </label>
				<input type="search" name="search" placeholder="" required>

                <br>
				<br>


				<label>hidden input </label>
				<input type="hidden" name="hidden" value="hidden">


                <br>
				<br>

				<label>Department</label>
					<select>
						<option>CSE</option>
						<option>EEE</option>
						<option selected>BBA</option>
						<option>English</option>
						<option>Architecture</option>
						<option>ICE</option>
						<option>Physics</option>
						<option>Mathematics</option>
					</select>


                <br>
				<br>

                <label>Skills</label>
				<input type="checkbox" name="skills" value="HTML" required>HTML
				<input type="checkbox" name="skills" value="CSS" required>CSS
                <input type="checkbox" name="skills" value="JavaScript" required>JavaScript
				<input type="checkbox" name="skills" value="PHP" required>PHP
				<input type="checkbox" name="skills" value="Laravel" required>Laravel


				<br>
				<br>


				<label>Password</label>
				<input type="password" name="password" placeholder="*****************" required>

                <br>
				<br>

				<label>Tell me about yourself</label>
				<textarea rows="8" cols="70" maxlength="250">
					
				</textarea>

				
				<br>
				<br>

				<input type="submit" name="submit">
				<input type="reset" name="reset">


				<br>
				<br>

			</form>

			
		
			<br>
			<br>
  </body>
</html>
